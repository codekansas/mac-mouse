name: release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-release-assets:
    name: build-release-assets
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-macmouse
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ]; then
            echo "Developer ID certificate secrets are required for release builds."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          INTERMEDIATE_CERT_PATH="$RUNNER_TEMP/developer-id-g2.cer"
          KEYCHAIN_PATH="$RUNNER_TEMP/macmouse-build.keychain-db"
          LOGIN_KEYCHAIN="$(security default-keychain -d user | tr -d '"' | xargs)"
          if [ -z "$LOGIN_KEYCHAIN" ]; then
            LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
          fi

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          curl --fail --location --silent --show-error \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            --output "$INTERMEDIATE_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          if ! security import "$INTERMEDIATE_CERT_PATH" -A -t cert -k "$LOGIN_KEYCHAIN"; then
            security find-certificate -Z -c "Developer ID Certification Authority" "$LOGIN_KEYCHAIN" \
              | grep -q "5B45F61068B29FCC8FFFF1A7E99B78DA9E9C4635"
          fi
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "MACMOUSE_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Run unit tests
        run: swift test

      - name: Build signed app bundle and ZIP
        env:
          MACMOUSE_REQUIRE_DEVELOPER_ID_SIGNING: "1"
          MACMOUSE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACMOUSE_NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          MACMOUSE_NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACMOUSE_NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/build_release_artifacts.sh "${{ github.event.release.tag_name }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.zip \
            dist/*.sha256 \
            --clobber
