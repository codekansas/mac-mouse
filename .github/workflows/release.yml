name: release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-dmg:
    name: build-dmg
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Run unit tests
        run: swift test

      - name: Build signed app bundle and DMG
        run: ./scripts/build_release_artifacts.sh "${{ github.event.release.tag_name }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.dmg \
            dist/*.sha256 \
            --clobber
