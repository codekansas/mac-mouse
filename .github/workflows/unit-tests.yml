name: unit-tests

on:
  push:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  unit-tests:
    name: unit-tests
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Run unit tests
        run: swift test
